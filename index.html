<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Rubik+Bubbles&display=swap" rel="stylesheet">

<style>
body{
margin:0;
overflow:hidden;
background:#0b0f2f;
font-family:'Rubik Bubbles',cursive;
color:white;
}

/* نجوم */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:.7;
}

/* blur */
.blur{
position:absolute;
width:100%;
height:100%;
backdrop-filter:blur(3px);
}

/* center */
.center{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* نص */
.big{
font-size:30px;
margin-bottom:50px;
}

/* الكيكة */
.cake{
display:flex;
flex-direction:column;
align-items:center;
}

/* طبقات (تحت كبير → فوق صغير) */
.layer{
height:35px;
border-radius:50px;
margin:6px auto;
opacity:0;
transform:translateY(-40px);
}

.l1{width:260px;background:#33cc66;} /* تحت */
.l2{width:210px;background:#ffee33;}
.l3{width:160px;background:#ff9933;}
.l4{width:120px;background:#ff4d4d;} /* فوق */

.show{
animation:drop .5s forwards;
}

@keyframes drop{
to{opacity:1;transform:translateY(0);}
}

/* الشمعة */
.candle{
width:12px;
height:45px;
background:pink;
position:relative;
}

.wick{
width:3px;
height:8px;
background:white;
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
}

.flame{
width:10px;
height:12px;
background:orange;
border-radius:50%;
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
display:none;
animation:flicker .2s infinite;
}

/* flame الولاعة (المكان الصح 🔥) */
.lighterFlame{
width:10px;
height:12px;
background:orange;
border-radius:50%;
position:absolute;
top:-10px;   /* فوق */
left:20px;   /* ناحية اليمين شوية */
display:none;
animation:flicker .2s infinite;
}

@keyframes flicker{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

/* الطاولة */
.table{
width:300px;
height:20px;
background:white;
margin-top:10px;
}

/* الولاعة */
.lighter{
width:35px;
height:60px;
background:gray;
position:absolute;
bottom:30px;
left:30px;
border-radius:6px;
}

/* السهم */
.arrow{
position:absolute;
bottom:120px;
left:30px;
text-align:center;
font-size:22px;
color:white;
}

.arrow span{
display:block;
font-size:14px;
margin-bottom:5px;
}

/* العد */
.count{
font-size:60px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="blur"></div>
<div id="app"></div>

<audio id="fireSound" src="fire.mp3"></audio>

<script>

let app=document.getElementById("app");

/* نجوم */
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}

/* الصفحة الأولى */
function page1(){
app.innerHTML=`
<div class="center">
<div class="big">wants to see your birthday cake?</div>
<button onclick="page2()">Continue</button>
</div>`;
}

/* الصفحة التانية */
function page2(){
app.innerHTML=`
<div class="center">

<div class="big" id="topText">Drag the lighter to light the candle</div>
<div id="count" class="count"></div>

<div class="cake">

<div class="candle">
<div class="wick"></div>
<div id="flame" class="flame"></div>
</div>

<div id="cake"></div>
<div class="table"></div>

</div>
</div>

<div class="arrow">
<span>the lighter</span>
⬇️
</div>

<div class="lighter" id="lighter">
<div class="lighterFlame" id="lighterFlame"></div>
</div>
`;

buildCake();
drag();
}

/* بناء الكيكة */
function buildCake(){
let cake=document.getElementById("cake");

["l4","l3","l2","l1"].forEach((c,i)=>{ 
/* 👆 ده اللي قلب الاتجاه صح */
setTimeout(()=>{
let d=document.createElement("div");
d.className="layer "+c;
cake.appendChild(d);
d.classList.add("show");
},i*600);
});
}

/* السحب */
function drag(){
let lighter=document.getElementById("lighter");
let flame=document.getElementById("flame");
let lFlame=document.getElementById("lighterFlame");

let drag=false,lit=false;

lighter.onpointerdown=()=>{drag=true;lFlame.style.display="block";}
document.onpointerup=()=>{drag=false;lFlame.style.display="none";}

document.onpointermove=e=>{
if(!drag||lit)return;

lighter.style.left=e.clientX+"px";
lighter.style.top=e.clientY+"px";

let c=document.querySelector(".candle").getBoundingClientRect();

if(e.clientX>c.left&&e.clientX<c.right&&e.clientY>c.top&&e.clientY<c.bottom){
lit=true;
flame.style.display="block";
lFlame.style.display="none";
document.getElementById("fireSound").play();
countdown();
}
}
}

/* العد */
function countdown(){
document.getElementById("topText").innerText="blow the candle after counting to ten";

let c=10;
let div=document.getElementById("count");

let i=setInterval(()=>{
div.innerText=c;
c--;
if(c<0){
clearInterval(i);
end();
}
},1000);
}

/* النهاية */
function end(){
document.getElementById("flame").style.display="none";

app.innerHTML=`
<div class="center">
<div class="big">HAPPY BIRTHDAY OUR NOUR! YAY</div>
</div>`;
}

page1();

</script>
</body>
</html>
